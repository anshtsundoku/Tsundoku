<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1A1614" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/icon-dark-192.png" />
    <!-- Webfonts for the three interface styles:
         Carlito  -> Wood (free metric-compatible Calibri twin)
         Archivo  -> Swiss (grotesque fallback for Helvetica)
         Fraunces -> Bohemian (characterful soft serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Carlito:ital,wght@0,400;0,700;1,400;1,700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet" />
    <!-- Apply the saved interface style + theme before first paint so there's
         no flash of the wrong skin (proper installed-app feel). -->
    <script>
      (function () {
        try {
          var us = localStorage.getItem('tsundoku.uiStyle');
          if (['wood', 'swiss', 'bohemian'].indexOf(us) < 0) us = 'wood';
          document.documentElement.classList.add('ui-' + us);
          var th = localStorage.getItem('tsundoku.theme');
          if (th !== 'light' && th !== 'dark') {
            th = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (th === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <!-- Google Identity Services (One Tap + Sign in with Google button).
         The OAuth client id is read in-app from import.meta.env.VITE_GOOGLE_CLIENT_ID. -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>Tsundoku</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
