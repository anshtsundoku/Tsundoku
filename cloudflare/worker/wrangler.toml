name = "tsundoku-api"
main = "src/index.js"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# D1 binding — create with `wrangler d1 create tsundoku`.
# After creation, paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "tsundoku"
database_id = "7546ad22-0771-438f-a443-af00a0d7e7f6"

# Cron triggers for ingestion pipelines + daily cleanup.
[triggers]
crons = [
  "*/5 * * * *",     # RSS + websites + podcasts
  "*/20 * * * *",    # Twitter
  "*/15 * * * *",    # YouTube
  "*/10 * * * *",    # Gmail newsletters + Gmail labels
  "0 3 * * *",       # Daily 3am: clean up read-and-aged posts (>7 days)
]

[vars]
TWITTER_POLL_HANDLES_PER_TICK = "5"
RSS_MAX_ITEMS = "20"
YOUTUBE_MAX_PER_CHANNEL = "5"
OWNER_EMAIL = "ansh.tsundoku@gmail.com"

# Secrets (set with `wrangler secret put <NAME>`):
#   GEMINI_API_KEY
#   YOUTUBE_API_KEY
#   GMAIL_CLIENT_ID
#   GMAIL_CLIENT_SECRET
#   GMAIL_REFRESH_TOKEN
#   TWITTER_AUTH_TOKEN
#   TWITTER_CT0
#   # Phase 1 multi-tenancy (auth plumbing):
#   JWT_SECRET        — session cookie signing key   (openssl rand -base64 48)
#   ENCRYPTION_KEY    — 32-byte hex AES-GCM key       (openssl rand -hex 32)
#   GOOGLE_CLIENT_ID  — OAuth web client id from Google Cloud Console
