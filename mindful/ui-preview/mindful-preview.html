<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1A1614" />
  <title>Mindful — preview</title>

  <!-- Carlito = free, metric-compatible Calibri twin -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Carlito:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />

  <!-- Tailwind via Play CDN — runtime compiles; perfect for a static preview -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Calibri', 'Carlito', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'] },
          colors: {
            bg:        'rgb(var(--bg) / <alpha-value>)',
            elev:      'rgb(var(--elev) / <alpha-value>)',
            ink:       'rgb(var(--ink) / <alpha-value>)',
            muted:     'rgb(var(--muted) / <alpha-value>)',
            wood:      'rgb(var(--wood) / <alpha-value>)',
            'wood-2':  'rgb(var(--wood-2) / <alpha-value>)',
            border:    'rgb(var(--border) / <alpha-value>)',
            highlight: 'rgb(var(--highlight) / <alpha-value>)',
          },
          boxShadow: { soft: '0 1px 2px rgba(0,0,0,0.04), 0 1px 12px rgba(60,40,30,0.05)' },
        },
      },
    };
  </script>

  <style>
    :root {
      --bg:        245 243 238;
      --elev:      255 254 251;
      --ink:        58  46  38;
      --muted:    110  96  85;
      --wood:     107  68  35;
      --wood-2:   150 112  75;
      --border:   229 221 210;
      --highlight: 232 198 138;
    }
    .dark {
      --bg:         26  22  20;
      --elev:       34  28  24;
      --ink:       232 223 211;
      --muted:    156 141 126;
      --wood:     176 137 104;
      --wood-2:   140 105  78;
      --border:    47  39  34;
      --highlight: 138 100  47;
    }
    html, body, #root { height: 100%; }
    body {
      background-color: rgb(var(--bg));
      color: rgb(var(--ink));
      font-family: 'Calibri', 'Carlito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "kern" 1, "liga" 1;
      -webkit-tap-highlight-color: transparent;
    }
    body, .card { transition: background-color 200ms ease, border-color 200ms ease, color 200ms ease; }
    mark.mindful-highlight {
      background-color: rgb(var(--highlight) / 0.4);
      color: rgb(var(--ink));
      border-radius: 2px;
      padding: 0 2px;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }
    .prose-mindful { font-size: 1.05rem; line-height: 1.7; }
    .prose-mindful p { margin: 0.75rem 0; }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-thumb { background: rgb(var(--border)); border-radius: 9999px; }
    *::-webkit-scrollbar-track { background: transparent; }

    /* Tiny preview banner so you know this is mock data */
    .preview-banner {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: rgb(var(--wood)); color: rgb(var(--bg));
      padding: 5px 12px; border-radius: 9999px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow: 0 2px 16px rgba(0,0,0,0.15);
      z-index: 50; user-select: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div class="preview-banner">UI Preview · Mock data · Changes saved locally</div>

  <script>
  /* =====================================================================
     Mindful — single-file UI preview
     Vanilla JS, no build step. State lives in localStorage.
     ===================================================================== */

  const DEFAULT_POSTS = [
    // Football
    { id: 1, source_id: 1, domain_slug: 'football', source_type: 'rss', source_name: 'The Athletic',
      title: 'Why pressing defenses are dominating the Champions League',
      author: 'The Athletic',
      tldr: 'Pressing schemes are winning more high turnovers this UCL season. Coaches are struggling to counter without dropping deeper.',
      content_text: 'A tactical breakdown of how high-pressure systems have reshaped European football this season. Top clubs are recovering possession in the final third more than ever, and the data tells an interesting story about why opposition managers are struggling to adapt.\n\nThree teams in particular — Bayer Leverkusen under Xabi Alonso, Atalanta under Gasperini, and PSG under Luis Enrique — are running PPDA numbers under 8.0, a threshold that historically correlates with deep European runs. The shift since 2022 has been steep.\n\nWhat makes this season different is the willingness of these sides to accept the risk: gegen-press on goal kicks, even when leading by a goal late in matches. Bayer\'s 2-1 win over Bayern in October was a case study.',

      read_time_min: 1, published_at: hoursAgo(5),

    { id: 3, source_id: 1, domain_slug: 'football', source_type: 'rss', source_name: 'The Athletic',

      tldr: 'Surprise Best XI: Aston Villa\'s Mings makes it; Cole Palmer cements MOTY frontrunner status. Surprise team: Forest. Manager: Emery.',
      content_text: 'It\'s late January, which means it\'s time for the midseason superlatives. We polled our writers across all 20 clubs. The consensus Best XI:\n\nGK Raya · DEF Trippier, Saliba, Mings, Estupiñán · MID Rice, Mac Allister, Palmer · ATT Saka, Haaland, Son.\n\nManager of the half-season: Unai Emery. Forest\'s rebound from last season is the biggest surprise.',
      read_time_min: 6, published_at: hoursAgo(12),
      is_read: true, is_bookmarked: true, is_dismissed: false },

    // AI
    { id: 4, source_id: 3, domain_slug: 'ai', source_type: 'newsletter', source_name: 'Stratechery',
      title: 'The shape of post-training',
      author: 'Ben Thompson',
      tldr: 'Value in frontier models is shifting from pre-training to post-training. Reshapes moats and CapEx logic.',
      content_text: 'The frontier labs have quietly shifted where the value is created. Pre-training compute is no longer the bottleneck; post-training — RLHF, RLAIF, and an increasingly long tail of evaluation harnesses — is doing the heavy lifting.\n\nThis has implications for the moat. If most of a model\'s observable quality comes from post-training, then the durable advantage is in the human-and-synthetic data pipeline, not in raw GPU count. That, in turn, suggests a very different shape of CapEx.\n\nThe second-order implication: hiring patterns at frontier labs already reflect this. The ratio of "researcher" to "data and eval engineer" headcount has inverted in the last 18 months at three labs I know of.',
      read_time_min: 7, published_at: hoursAgo(3),
      is_read: false, is_bookmarked: false, is_dismissed: false },

    { id: 5, source_id: 4, domain_slug: 'ai', source_type: 'youtube', source_name: 'Yannic Kilcher',
      title: 'New paper: Memory-augmented transformers can dramatically reduce inference cost',
      author: 'Yannic Kilcher',
      tldr: 'Retrieval-cached KV attention gives 3-5x inference speedup with <1% quality loss on long contexts.',
      content_text: 'Detailed summary: The paper proposes a retrieval-cached attention mechanism where KV-cache fragments persist across queries, indexed by semantic similarity. On long-context benchmarks this yields 3-5x inference speedups with under 1% quality regression.\n\nThe gains are largest on conversational workloads where context overlap is high. Limitations: cache invalidation is non-trivial and memory footprint grows linearly with the number of unique cached fragments.\n\nYannic\'s critique: the eval set may be too forgiving — they evaluate only on benchmarks where retrieved context aligns well with the query. Real-world distribution shift could hurt the gains substantially. Still, the approach is a strong directional signal.',
      image_url: 'https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800',
      video_url: null,
      read_time_min: 12, published_at: hoursAgo(8),
      is_read: false, is_bookmarked: true, is_dismissed: false },

    { id: 6, source_id: 3, domain_slug: 'ai', source_type: 'newsletter', source_name: 'Stratechery',
      title: 'Anthropic\'s latest, and the agentic stack',
      author: 'Ben Thompson',
      tldr: 'Tool-use latency, not raw reasoning, is the bottleneck for agents in production. Implications for orchestration layers.',
      content_text: 'A different angle on the agent debate: the gating factor in real-world agent systems isn\'t reasoning, it\'s tool-call latency and reliability. Companies running agents in production are converging on patterns that look more like distributed systems engineering than ML engineering.\n\nThis is where the orchestration startups have a real wedge — not in the LLM layer, but in the layer that makes 50 LLM calls feel like one.',
      read_time_min: 5, published_at: hoursAgo(20),
      is_read: true, is_bookmarked: false, is_dismissed: false },

    // Consumerism
    { id: 7, source_id: 5, domain_slug: 'consumerism', source_type: 'website', source_name: 'Not Boring',
      title: 'The new American shopping cart',
      author: 'Packy McCormick',
      tldr: 'DTC profitability is being driven less by ads, more by smarter returns management.',
      content_text: 'A look at how vertically integrated DTC brands are using AI-driven personalization to rebuild the shopping experience from scratch. The interesting wrinkle: many are now profitable not because of marketing efficiency but because of better unit economics on returns.\n\nThe quiet revolution is at the warehouse layer. Brands like True Classic and Cuts Clothing built proprietary return-prediction models that flag SKU+size combos with high return likelihood before the customer hits checkout. The intervention — usually a free upgrade or a sizing recommendation — saves the return.\n\nFor companies operating at 20% return rates, dropping that to 12% has a 5x leverage effect on contribution margin.',
      image_url: 'https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=800',
      read_time_min: 6, published_at: hoursAgo(6),
      is_read: false, is_bookmarked: false, is_dismissed: false },

    // Product
    { id: 8, source_id: 6, domain_slug: 'product', source_type: 'newsletter', source_name: "Lenny's Newsletter",
      title: 'How Linear approaches product reviews',
      author: 'Lenny Rachitsky',
      tldr: "Linear's async-first product reviews force explicit tradeoffs in a tight written template.",
      content_text: 'Linear runs weekly product reviews differently from most companies — async-first, with a tight written template that forces the team to make explicit tradeoffs. The format is reproducible: status, deltas, the one decision needed, and a 10-min sync only if a blocker emerges.\n\nThe template, slightly paraphrased: (1) What shipped this week. (2) What slipped, and why. (3) The single decision we need from leadership. (4) Confidence on the next milestone, with one number.\n\nThe key insight isn\'t the template — it\'s the cultural commitment to actually skipping the sync when there\'s no blocker. Most teams default to "let\'s just hop on a call" the moment a written update has any ambiguity.',
      read_time_min: 5, published_at: hoursAgo(10),
      is_read: false, is_bookmarked: false, is_dismissed: false },

    { id: 9, source_id: 7, domain_slug: 'product', source_type: 'twitter', source_name: '@shreyas',
      title: null, author: '@shreyas',
      tldr: "A strategy isn't a feature list — it answers what's uniquely true, what changed, and what you won't do.",
      content_text: "Most product strategy docs fail at the same place: they're a list of features dressed up as a thesis.\n\nA strategy answers:\n— what is uniquely true about us\n— what changes in the world made now the time\n— what will we deliberately not do",
      read_time_min: 1, published_at: hoursAgo(14),
      is_read: false, is_bookmarked: false, is_dismissed: false },

      content_text: "If your roadmap meeting feels like a strategy meeting, your strategy meeting probably doesn't exist.\n\nRoadmap meetings discuss what & when.\nStrategy meetings discuss why — what we believe about the world, and what we'll do because of it.\n\nDifferent cadence, different attendees, different artifacts.",
      read_time_min: 1, published_at: hoursAgo(36),
      is_read: true, is_bookmarked: false, is_dismissed: false },
  ];

  function hoursAgo(h) {
    return new Date(Date.now() - h * 3600 * 1000).toISOString();
  }

  // ---------- State (localStorage) ----------
  const STATE_KEY = 'mindful-preview-state-v1';
  const THEME_KEY = 'mindful-preview-theme';

  let state = loadState();

  function loadState() {
    try {
      const raw = localStorage.getItem(STATE_KEY);
      if (raw) {
        const s = JSON.parse(raw);
        // Re-attach any new defaults that the saved state is missing.
        if (s.posts && s.domains && s.sources) return s;
      }
    } catch {}
    return {
      domains: DEFAULT_DOMAINS,
      sources: DEFAULT_SOURCES,
      posts:   DEFAULT_POSTS,
      highlights: {},   // post_id → [{ id, text, created_at }]
    };
  }
  function saveState() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
  function resetState() { localStorage.removeItem(STATE_KEY); state = loadState(); render(); }

  // ---------- Theme ----------
  function currentTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === 'light' || saved === 'dark') return saved;
    return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  function applyTheme(t) {
    document.documentElement.classList.toggle('dark', t === 'dark');
    localStorage.setItem(THEME_KEY, t);
    document.querySelector('meta[name="theme-color"]').setAttribute('content', t === 'dark' ? '#1A1614' : '#F5F3EE');
  }
  function toggleTheme() { applyTheme(currentTheme() === 'dark' ? 'light' : 'dark'); }
  applyTheme(currentTheme());

  // ---------- Utilities ----------
  function $(html) { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; }
  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
  function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
  function timeAgo(iso) {
    if (!iso) return '';
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm';
    if (diff < 86400) return Math.floor(diff/3600) + 'h';
    return Math.floor(diff/86400) + 'd';
  }
  function sourceBadge(t) { return { rss:'RSS', website:'Web', twitter:'𝕏', youtube:'YT', newsletter:'✉' }[t] || t; }

  // ---------- Icons (inline SVG) ----------
  const ICONS = {
    sun:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
    moon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
    home: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg>',
    gear: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>',
    check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5"><path d="M20 6L9 17l-5-5"/></svg>',
    bookmark:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>',
    bookmarkFilled:'<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>',
    x:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5"><path d="M18 6L6 18M6 6l12 12"/></svg>',
    highlight:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M9 11l-6 6v4h4l6-6M14 4l6 6-9 9H5v-6z"/></svg>',
    plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M12 5v14M5 12h14"/></svg>',
    trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',
  };

  function domainIcon(name) {
    const b = 'fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7"';
    switch (name) {
      case 'football': return `<svg viewBox="0 0 24 24" ${b}><circle cx="12" cy="12" r="9"/><path d="M12 3l3 3-1 4-4 0-1-4z M12 21v-4 M3 12h4 M21 12h-4 M5 18l3-2 M19 18l-3-2"/></svg>`;
      case 'sparkle':  return `<svg viewBox="0 0 24 24" ${b}><path d="M12 3l1.8 4.7L18.5 9.5l-4.7 1.8L12 16l-1.8-4.7L5.5 9.5l4.7-1.8z M19 15l.9 2.1L22 18l-2.1.9L19 21l-.9-2.1L16 18l2.1-.9z"/></svg>`;
      case 'shopping': return `<svg viewBox="0 0 24 24" ${b}><path d="M6 7h12l-1 13H7zM9 7V5a3 3 0 0 1 6 0v2"/></svg>`;
      case 'cube':     return `<svg viewBox="0 0 24 24" ${b}><path d="M21 7.5l-9-5-9 5v9l9 5 9-5z M3 7.5l9 5 9-5 M12 22V12"/></svg>`;
      default:         return `<svg viewBox="0 0 24 24" ${b}><circle cx="12" cy="12" r="9"/></svg>`;
    }
  }

  // ---------- Routing ----------
  function currentRoute() {
    const h = location.hash.replace(/^#/, '') || '/';
    if (h === '/')          return { name: 'home' };
    if (h.startsWith('/d/')) return { name: 'domain', slug: h.slice(3).split('?')[0], tab: new URLSearchParams(h.split('?')[1] || '').get('tab') || 'unread' };
    if (h === '/sources')    return { name: 'sources' };
    return { name: 'home' };
  }
  function go(path) { location.hash = path; }

  // ---------- Domain stats ----------
  function domainStats(slug) {
    const ps = state.posts.filter(p => p.domain_slug === slug && !p.is_dismissed);
    return {
      unread: ps.filter(p => !p.is_read).length,
      bookmarks: ps.filter(p => p.is_bookmarked).length,
      total: ps.length,
    };
  }

  // ---------- Render: shell ----------
  function renderShell(body) {
    const route = currentRoute();
    const theme = currentTheme();
    const root = document.getElementById('root');
    root.innerHTML = '';
    root.appendChild($(`
      <div class="min-h-screen bg-bg text-ink">
        <header class="sticky top-0 z-20 backdrop-blur bg-bg/85 border-b border-border">
          <div class="max-w-4xl mx-auto px-4 py-3 flex items-center gap-3">
            <a href="#/" class="font-bold tracking-tight text-lg flex items-center gap-2">
              <span class="inline-block w-2.5 h-2.5 rounded-full bg-wood"></span> Mindful
            </a>
            <div class="flex-1"></div>
            ${route.name !== 'home' ? `<a href="#/" class="p-2 rounded-md hover:bg-elev text-muted" aria-label="Home">${ICONS.home}</a>` : ''}
            <a href="#/sources" class="p-2 rounded-md hover:bg-elev text-muted" aria-label="Sources">${ICONS.gear}</a>
            <button id="theme-toggle" class="p-2 rounded-md hover:bg-elev text-muted" aria-label="Toggle theme">
              ${theme === 'dark' ? ICONS.sun : ICONS.moon}
            </button>
          </div>
        </header>
        <main class="max-w-4xl mx-auto px-4 py-6" id="main"></main>
      </div>
    `));
    document.getElementById('theme-toggle').addEventListener('click', () => { toggleTheme(); render(); });
    document.getElementById('main').appendChild(body);
  }

  // ---------- Render: Home ----------
  function renderHome() {
    const wrap = $(`<div></div>`);
    wrap.appendChild($(`<p class="text-muted mb-6 font-light">Four corners of attention. Pick one.</p>`));
    const grid = $(`<div class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>`);
    for (const d of state.domains) {
      const s = domainStats(d.slug);
      grid.appendChild($(`
        <a href="#/d/${d.slug}" class="group card relative bg-elev border border-border rounded-xl p-5 shadow-soft hover:border-wood/50 hover:-translate-y-0.5 transition">
          <div class="flex items-start gap-4">
            <div class="text-wood">${domainIcon(d.icon)}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-baseline justify-between gap-3">
                <h2 class="text-xl font-bold tracking-tight">${escapeHtml(d.name)}</h2>
                ${s.unread > 0 ? `<span class="text-xs font-bold text-bg bg-wood rounded-full px-2 py-0.5 min-w-[1.5rem] text-center">${s.unread}</span>` : ''}
              </div>
              <div class="mt-1 text-sm text-muted">
                ${s.unread > 0 ? `${s.unread} new · ${s.total} total` : (s.total > 0 ? `${s.total} read` : 'No content yet')}
              </div>
            </div>
          </div>
        </a>
      `));
    }
    wrap.appendChild(grid);
    wrap.appendChild($(`<div class="mt-10 text-center"><a href="#/sources" class="text-sm text-muted hover:text-ink underline-offset-2 hover:underline">Manage sources →</a></div>`));
    renderShell(wrap);
  }

  // ---------- Render: Domain feed ----------
  function renderDomain(slug, tab) {
    const dom = state.domains.find(d => d.slug === slug);
    if (!dom) { go('/'); return; }
    let ps = state.posts.filter(p => p.domain_slug === slug && !p.is_dismissed);
    if (tab === 'read')      ps = ps.filter(p => p.is_read);
    else if (tab === 'bookmark') ps = ps.filter(p => p.is_bookmarked);
    else                          ps = ps.filter(p => !p.is_read);
    ps.sort((a,b) => new Date(b.published_at) - new Date(a.published_at));

    const wrap = $(`<div></div>`);
    wrap.appendChild($(`
      <div class="mb-5">
        <a href="#/" class="text-sm text-muted hover:text-ink">← Domains</a>
        <h1 class="mt-2 text-2xl font-bold tracking-tight">${escapeHtml(dom.name)}</h1>
      </div>
    `));

    const tabs = $(`<div class="flex gap-1 border-b border-border mb-5"></div>`);
    for (const t of [{key:'unread',label:'Unread'},{key:'read',label:'Read'},{key:'bookmark',label:'Bookmarked'}]) {
      const active = tab === t.key;
      const a = $(`<a href="#/d/${slug}?tab=${t.key}" class="px-3 py-2 text-sm font-medium border-b-2 -mb-px transition ${active ? 'border-wood text-ink' : 'border-transparent text-muted hover:text-ink'}">${t.label}</a>`);
      tabs.appendChild(a);
    }
    wrap.appendChild(tabs);

    if (ps.length === 0) {
      wrap.appendChild($(`<div class="text-muted text-center py-12">${tab === 'unread' ? 'You’re all caught up.' : tab === 'read' ? 'Nothing read yet.' : 'No bookmarks here yet.'}</div>`));
    } else {
      const list = $(`<div class="space-y-3"></div>`);
      for (const p of ps) list.appendChild(renderPostCard(p));
      wrap.appendChild(list);
    }
    renderShell(wrap);
  }

  function renderPostCard(p) {
    const card = $(`
      <article class="card group bg-elev border border-border rounded-xl p-4 shadow-soft hover:border-wood/40 cursor-pointer transition">
        <div class="flex items-center gap-2 text-xs text-muted mb-2">
          <span class="font-bold uppercase tracking-wider text-wood">${sourceBadge(p.source_type)}</span>
          <span>·</span>
          <span class="truncate">${escapeHtml(p.source_name || p.author || '')}</span>
          <span>·</span>
          <span>${timeAgo(p.published_at)}</span>
          ${p.read_time_min ? `<span>·</span><span>${p.read_time_min} min</span>` : ''}
        </div>
        ${p.title ? `<h3 class="font-bold text-lg leading-snug mb-1.5 group-hover:text-wood transition">${escapeHtml(p.title)}</h3>` : ''}
        ${p.tldr ? `<p class="text-sm text-muted leading-relaxed mb-3">${escapeHtml(p.tldr)}</p>` : ''}
        ${p.image_url ? `<img src="${p.image_url}" alt="" loading="lazy" class="rounded-md mb-3 w-full max-h-56 object-cover border border-border" />` : ''}
        <div class="flex items-center gap-2 mt-1" data-actions>
          ${!p.is_read ? `<button data-action="read" class="text-xs px-2.5 py-1 rounded-md border border-border text-muted hover:text-ink hover:border-wood/50 flex items-center gap-1.5">${ICONS.check} Mark read</button>` : ''}
          <button data-action="bookmark" class="text-xs px-2.5 py-1 rounded-md border flex items-center gap-1.5 ${p.is_bookmarked ? 'border-wood text-wood bg-wood/10' : 'border-border text-muted hover:text-ink hover:border-wood/50'}">
            ${p.is_bookmarked ? ICONS.bookmarkFilled : ICONS.bookmark} ${p.is_bookmarked ? 'Bookmarked' : 'Bookmark'}
          </button>
          <div class="flex-1"></div>
          <button data-action="dismiss" class="text-xs px-2 py-1 rounded-md text-muted hover:text-wood hover:bg-wood/5 flex items-center gap-1.5" title="Remove from feed">${ICONS.x} Remove</button>
        </div>
      </article>
    `);
    card.addEventListener('click', (e) => {
      if (e.target.closest('[data-actions]')) return;
      openPostDetail(p);
    });
    card.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const a = btn.dataset.action;
        if (a === 'read')     { p.is_read = true; }
        if (a === 'bookmark') { p.is_bookmarked = !p.is_bookmarked; }
        if (a === 'dismiss')  { p.is_dismissed = true; }
        saveState(); render();
      });
    });
    return card;
  }

  // ---------- Render: Post detail (side sheet) ----------
  function openPostDetail(p) {
    const overlay = $(`<div class="fixed inset-0 z-30 bg-bg/70 backdrop-blur-sm flex justify-end"></div>`);
    const sheet = $(`<div class="w-full max-w-2xl h-full bg-elev border-l border-border overflow-y-auto"></div>`);
    overlay.appendChild(sheet);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeSheet(); });
    function closeSheet() { overlay.remove(); }

    const highlights = state.highlights[p.id] || [];

    // Build body html with existing highlights wrapped in <mark>.
    let bodyHtml = (p.content_text || '').split(/\n\n+/).map(par => `<p>${escapeHtml(par)}</p>`).join('');
    for (const h of highlights) {
      const re = new RegExp(escapeRegExp(h.text), 'g');
      bodyHtml = bodyHtml.replace(re, m => `<mark class="mindful-highlight">${m}</mark>`);
    }

    sheet.appendChild($(`
      <div class="sticky top-0 z-10 bg-elev/95 backdrop-blur border-b border-border px-5 py-3 flex items-center gap-2">
        <button data-act="close" class="text-sm text-muted hover:text-ink">← Back</button>
        <div class="flex-1"></div>
        ${!p.is_read ? `<button data-act="read" class="text-xs px-2.5 py-1 rounded-md border border-border text-muted hover:text-ink flex items-center gap-1.5">${ICONS.check} Mark read</button>` : ''}
        <button data-act="bookmark" class="text-xs px-2.5 py-1 rounded-md border flex items-center gap-1.5 ${p.is_bookmarked ? 'border-wood text-wood bg-wood/10' : 'border-border text-muted hover:text-ink'}">
          ${p.is_bookmarked ? ICONS.bookmarkFilled : ICONS.bookmark}
        </button>
      </div>
    `));
    const body = $(`<div class="px-5 py-6"></div>`);
    body.appendChild($(`
      <div class="text-xs uppercase tracking-wider text-wood mb-2 font-bold">
        ${escapeHtml(p.source_name || p.author || '')}${p.read_time_min ? ` · ${p.read_time_min} min` : ''}
      </div>
    `));
    if (p.title) body.appendChild($(`<h1 class="text-2xl font-bold leading-tight mb-3">${escapeHtml(p.title)}</h1>`));
    if (p.tldr) body.appendChild($(`<div class="bg-bg border-l-2 border-wood pl-3 py-1 mb-5 text-muted italic text-sm">TLDR · ${escapeHtml(p.tldr)}</div>`));
    if (p.image_url) body.appendChild($(`<img src="${p.image_url}" alt="" class="rounded-lg mb-5 border border-border max-w-full" />`));

    const article = $(`<div class="prose-mindful" id="post-body">${bodyHtml}</div>`);
    body.appendChild(article);

    if (highlights.length > 0) {
      const hl = $(`<div class="mt-8 pt-6 border-t border-border"></div>`);
      hl.appendChild($(`<h3 class="font-bold text-sm uppercase tracking-wider text-wood mb-3">Your highlights (${highlights.length})</h3>`));
      const ul = $(`<ul class="space-y-2"></ul>`);
      for (const h of highlights) {
        ul.appendChild($(`<li class="text-sm text-muted bg-bg border-l-2 border-wood/60 pl-3 py-1.5">"${escapeHtml(h.text)}"</li>`));
      }
      hl.appendChild(ul);
      body.appendChild(hl);
    }

    sheet.appendChild(body);

    // Floating highlight button on text selection.
    let selBtn = null;
    function updateSelectionBtn() {
      const sel = window.getSelection();
      const text = sel && !sel.isCollapsed ? sel.toString().trim() : '';
      if (!text || !article.contains(sel.anchorNode)) {
        if (selBtn) { selBtn.remove(); selBtn = null; }
        return;
      }
      if (selBtn) selBtn.remove();
      selBtn = $(`<button class="fixed bottom-6 right-6 z-40 bg-wood text-bg shadow-lg rounded-full px-4 py-2.5 flex items-center gap-2 hover:bg-wood-2 transition">${ICONS.highlight}<span class="text-sm font-bold">Highlight</span></button>`);
      selBtn.addEventListener('click', () => {
        if (!state.highlights[p.id]) state.highlights[p.id] = [];
        state.highlights[p.id].push({ id: Date.now(), text, created_at: new Date().toISOString() });
        saveState();
        sel.removeAllRanges();
        if (selBtn) { selBtn.remove(); selBtn = null; }
        // Re-open sheet with updated highlights.
        closeSheet();
        openPostDetail(p);
      });
      document.body.appendChild(selBtn);
    }
    document.addEventListener('selectionchange', updateSelectionBtn);
    overlay.addEventListener('remove', () => document.removeEventListener('selectionchange', updateSelectionBtn));

    sheet.querySelectorAll('[data-act]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const a = btn.dataset.act;
        if (a === 'close')    { if (selBtn) selBtn.remove(); closeSheet(); }
        if (a === 'read')     { p.is_read = true; saveState(); closeSheet(); render(); }
        if (a === 'bookmark') { p.is_bookmarked = !p.is_bookmarked; saveState(); closeSheet(); openPostDetail(p); }
      });
    });

    document.body.appendChild(overlay);
  }

  // ---------- Render: Sources ----------
  const SOURCE_TYPES = [
    { value: 'website',    label: 'Website / blog', hint: 'Paste the homepage URL (e.g. https://stratechery.com). We’ll auto-find its RSS feed.' },
    { value: 'rss',        label: 'RSS feed',       hint: 'Paste the full feed URL (e.g. https://example.com/feed.xml)' },
    { value: 'twitter',    label: 'Twitter / X',    hint: 'Handle only, no @' },
    { value: 'youtube',    label: 'YouTube',        hint: 'Channel ID (UC…) or @handle' },
    { value: 'newsletter', label: 'Newsletter',     hint: 'The sender’s email address' },
  ];

  function renderSources() {
    const wrap = $(`<div></div>`);
    wrap.appendChild($(`<a href="#/" class="text-sm text-muted hover:text-ink">← Domains</a><h1 class="mt-2 text-2xl font-bold tracking-tight mb-6">Sources</h1>`));

    // Add-source form
    const form = $(`
      <form class="card bg-elev border border-border rounded-xl p-5 mb-8">
        <h2 class="font-bold mb-3 flex items-center gap-2">${ICONS.plus} Add a source</h2>
        <div class="grid sm:grid-cols-2 gap-3">
          <label class="text-sm">
            <div class="text-muted text-xs uppercase tracking-wider mb-1">Type</div>
            <select name="type" class="w-full bg-bg border border-border rounded-md px-3 py-2 text-ink">
              ${SOURCE_TYPES.map(t => `<option value="${t.value}">${t.label}</option>`).join('')}
            </select>
          </label>
          <label class="text-sm">
            <div class="text-muted text-xs uppercase tracking-wider mb-1">Domain</div>
            <select name="domain" class="w-full bg-bg border border-border rounded-md px-3 py-2 text-ink">
              ${state.domains.map(d => `<option value="${d.slug}">${escapeHtml(d.name)}</option>`).join('')}
            </select>
          </label>
          <label class="text-sm sm:col-span-2">
            <div class="text-muted text-xs uppercase tracking-wider mb-1">Identifier</div>
            <input name="identifier" required class="w-full bg-bg border border-border rounded-md px-3 py-2 text-ink" />
            <div class="text-xs text-muted mt-1" id="hint"></div>
          </label>
          <label class="text-sm sm:col-span-2">
            <div class="text-muted text-xs uppercase tracking-wider mb-1">Display name (optional)</div>
            <input name="display_name" class="w-full bg-bg border border-border rounded-md px-3 py-2 text-ink" />
          </label>
        </div>
        <div class="mt-4 flex items-center gap-3">
          <button type="submit" class="bg-wood text-bg font-bold rounded-md px-4 py-2 hover:bg-wood-2">Add source</button>
          <span class="text-xs text-muted">(Preview mode: saved locally only)</span>
        </div>
      </form>
    `);
    const typeSel = form.querySelector('[name=type]');
    const hint = form.querySelector('#hint');
    function setHint() { hint.textContent = SOURCE_TYPES.find(t => t.value === typeSel.value)?.hint || ''; }
    typeSel.addEventListener('change', setHint); setHint();
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form));
      if (!data.identifier) return;
      state.sources.push({
        id: Date.now(),
        type: data.type,
        identifier: data.identifier,
        display_name: data.display_name || data.identifier,
        domain_slug: data.domain,
      });
      saveState(); render();
    });
    wrap.appendChild(form);

    // Grouped existing sources
    const groups = $(`<div class="space-y-6"></div>`);
    for (const d of state.domains) {
      const srcs = state.sources.filter(s => s.domain_slug === d.slug);
      const block = $(`<div></div>`);
      block.appendChild($(`<h3 class="font-bold text-sm uppercase tracking-wider text-wood mb-2">${escapeHtml(d.name)}</h3>`));
      if (srcs.length === 0) {
        block.appendChild($(`<div class="text-sm text-muted italic">No sources yet.</div>`));
      } else {
        const ul = $(`<ul class="divide-y divide-border border border-border rounded-xl overflow-hidden bg-elev"></ul>`);
        for (const s of srcs) {
          const li = $(`
            <li class="px-4 py-3 flex items-center gap-3">
              <span class="text-xs font-bold text-wood uppercase tracking-wider w-20">${s.type}</span>
              <div class="flex-1 min-w-0">
                <div class="font-medium truncate">${escapeHtml(s.display_name || s.identifier)}</div>
                <div class="text-xs text-muted truncate">${escapeHtml(s.identifier)}</div>
              </div>
              <button data-del="${s.id}" class="text-muted hover:text-wood" aria-label="Delete">${ICONS.trash}</button>
            </li>
          `);
          li.querySelector('[data-del]').addEventListener('click', () => {
            if (!confirm('Remove this source?')) return;
            state.sources = state.sources.filter(x => x.id !== s.id);
            saveState(); render();
          });
          ul.appendChild(li);
        }
        block.appendChild(ul);
      }
      groups.appendChild(block);
    }
    wrap.appendChild(groups);

    // Reset button
    wrap.appendChild($(`<div class="mt-10 pt-6 border-t border-border text-center"><button id="reset" class="text-xs text-muted hover:text-wood underline-offset-2 hover:underline">Reset preview data</button></div>`));
    renderShell(wrap);
    document.getElementById('reset').addEventListener('click', () => {
      if (confirm('Reset all preview data back to defaults?')) resetState();
    });
  }

  // ---------- Router ----------
  function render() {
    const r = currentRoute();
    if (r.name === 'home')    return renderHome();
    if (r.name === 'domain')  return renderDomain(r.slug, r.tab);
    if (r.name === 'sources') return renderSources();
    renderHome();
  }

  window.addEventListener('hashchange', render);
  render();
  </script>
</body>
</html>
